<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#f5f5f5;padding:20px}

.cart-item{
  background:#fff;
  display:flex;
  gap:15px;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}

.cart-item img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

.details{flex:1}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qty button{
  width:30px;
  height:30px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
  border-radius:5px;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:20px;
}
/* ===== FOOTER ===== */
footer {
  background: #111;
  color: #fff;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<h2>Your Cart</h2>
<br>

<div id="cart"></div>

<p class="total">Total: ₦<span id="total">0</span></p>
 <!-- FOOTER -->
 <footer>
  <p>&copy; 2026 BLUNTZ Collection. All rights reserved.</p>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartBox = document.getElementById("cart");
const totalEl = document.getElementById("total");

function renderCart(){
  cartBox.innerHTML="";
  let total = 0;

  cart.forEach((item,index)=>{
    total += item.price * item.qty;

    cartBox.innerHTML += `
      <div class="cart-item">
        <img src="${item.img}">
        <div class="details">
          <h4>${item.name}</h4>
          <p>₦${item.price}</p>

          <div class="qty">
            <button onclick="changeQty(${index},-1)">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${index},1)">+</button>
          </div>

          <p><b>Subtotal:</b> ₦${item.price * item.qty}</p>
        </div>
      </div>
    `;
  });

  totalEl.innerText = total;
  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(index,change){
  cart[index].qty += change;
  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }
  renderCart();
}

renderCart();
</script>

</body>
</html>
